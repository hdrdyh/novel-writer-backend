<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #7C5CFF;
      --color-primary-container:    #9B82FF;
      --color-on-primary:           #ffffff;
      /* === 背景 / 表面（暗色毛玻璃系） === */
      --color-background:                 #070A14;
      --color-surface-container-lowest:   #0D1120;
      --color-surface:                    #111628;
      --color-surface-container:          #161C35;
      --color-surface-container-high:     #1C2442;
      --color-surface-container-highest:  #232D50;
      /* === 文字 === */
      --color-on-surface:           #F7FAFF;
      --color-on-surface-variant:   #9AA7C7;
      /* === 功能色 === */
      --color-success:  #62FAD3;
      --color-error:    #FF6B8A;
      --color-warning:  #FFD166;
      /* === 边框 === */
      --color-outline:          rgba(255,255,255,0.12);
      --color-outline-variant:  rgba(255,255,255,0.06);
      /* === 圆角 === */
      --radius-sm:   0.5rem;
      --radius-md:   0.75rem;
      --radius-lg:   1rem;
      --radius-xl:   1.25rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 4px 16px rgba(0,0,0,0.4);
      --shadow-float:  0 10px 30px rgba(0,0,0,0.5);
      --shadow-dialog: 0 25px 60px rgba(0,0,0,0.7);
      /* === 字体 === */
      --font-sans: "Manrope", system-ui, sans-serif;
    }
  </style>

  <style>
    body {
      min-height: max(812px, 100dvh);
      font-family: "Manrope", system-ui, sans-serif;
    }
    /* 毛玻璃效果 */
    .glass {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .glass-high {
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.12);
    }
    /* 发光效果 */
    .glow-primary {
      box-shadow: 0 0 20px rgba(124,92,255,0.3);
    }
    .glow-accent {
      box-shadow: 0 0 20px rgba(105,231,255,0.3);
    }
    .glow-success {
      box-shadow: 0 0 12px rgba(98,250,211,0.25);
    }
    /* 渐变按钮 */
    .btn-gradient {
      background: linear-gradient(135deg, #7C5CFF 0%, #69E7FF 100%);
      color: #070A14;
      font-weight: 700;
    }
    /* 进度条动画 */
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .animate-pulse-glow {
      animation: pulse-glow 2s ease-in-out infinite;
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .shimmer {
      position: relative;
      overflow: hidden;
    }
    .shimmer::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(124,92,255,0.15), transparent);
      animation: shimmer 2s infinite;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 导航组件 -->
  <header class="bg-background/80 backdrop-blur-xl sticky top-0 z-40 h-14 flex items-center justify-between px-4 border-b border-outline-variant/20">
    <button class="w-10 h-10 flex items-center justify-center text-on-surface-variant rounded-full hover:bg-surface-container transition-colors">
      <i data-lucide="arrow-left" class="w-5 h-5"></i>
    </button>
    <h1 class="text-base font-semibold text-on-surface">页面标题</h1>
    <button class="w-10 h-10 flex items-center justify-center text-on-surface-variant rounded-full hover:bg-surface-container transition-colors">
      <i data-lucide="settings" class="w-5 h-5"></i>
    </button>
  </header>
  <!-- @nav:end 导航组件 -->

  <main class="flex-1 overflow-y-auto pb-[env(safe-area-inset-bottom)]">
    <!-- @main-content:start -->
    <!-- @main-content:end -->
  </main>

  <script>lucide.createIcons();</script>
</body>

</html>
